name: LIAC SEO Agent

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      keyword_override:
        description: 'Optional: override the keyword'
        required: false
        default: ''

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic google-auth google-auth-httplib2 google-api-python-client

      - name: Run SEO Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          KEYWORD_OVERRIDE: ${{ github.event.inputs.keyword_override }}
        run: python agent.py
