name: LIAC SEO Agent

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run SEO Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTPUT_DIR: output
        run: python agent.py

      - name: Upload SEO content as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIAC-SEO-Content-${{ github.run_number }}
          path: output/
          retention-days: 30
